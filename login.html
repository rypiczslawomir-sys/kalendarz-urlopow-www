<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie — Kalendarz urlopowy</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <main class="login-page">
        <div class="login-card">
            <div class="login-brand">
                <span class="login-icon">📅</span>
                <h1>Kalendarz urlopowy</h1>
                <p>Zaloguj się, aby kontynuować</p>
            </div>

            <form id="loginForm" class="login-form" autocomplete="on">
                <label class="login-field">
                    <span>Login</span>
                    <input type="text" id="loginUser" name="username" autocomplete="username" required autofocus>
                </label>
                <label class="login-field">
                    <span>Hasło</span>
                    <input type="password" id="loginPass" name="password" autocomplete="current-password" required>
                </label>
                <p class="login-error" id="loginError" hidden></p>
                <button type="submit" class="login-btn" id="loginSubmit">Zaloguj</button>
            </form>
        </div>
    </main>
    <script src="js/login.js"></script>
</body>
</html>
